name: Validate Changesets

on:
  pull_request:
    paths:
      - '.changeset/*.md'

concurrency:
  group: validate-changesets-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-changesets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install llm CLI
        run: |
          python -m pip install --upgrade pip
          pip install "llm-github-models"

      - name: Collect and validate changesets
        id: validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Starting changeset validation"

          # Find changed changeset files
          echo "Looking for changed files between ${{ github.event.pull_request.base.sha }} and ${{ github.sha }}"
          git diff --name-only --diff-filter=AM \
            "${{ github.event.pull_request.base.sha }}...${{ github.sha }}" \
            -- '.changeset/*.md' | grep -v 'README.md' > changeset_files.txt || true

          echo "Found changeset files:"
          cat changeset_files.txt || true

          if [ ! -s changeset_files.txt ]; then
            echo "::notice::No changeset files to validate"
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Found $(wc -l < changeset_files.txt) changeset file(s) to validate"

          # Collect changeset contents using XML-style tags for better AI parsing
          changesets=""
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "Reading changeset file: $file"
              changesets+="<changeset file=\"$file\">\n"
              changesets+="$(cat "$file")\n"
              changesets+="</changeset>\n\n"
            else
              echo "::warning::Changeset file not found: $file"
            fi
          done < changeset_files.txt

          echo "Collected changesets content (first 500 chars):"
          echo "$changesets" | head -c 500

          # Create the validation prompt
          prompt="You are a changeset format validator for the Astro project.

          Validate each changeset file individually against Astro's official guidelines:

          REQUIRED FORMAT:
          - Must start with YAML frontmatter using --- delimiters
          - Package name must be specified (e.g., 'astro': patch)
          - Change type: patch (bug fixes), minor (new features), major (breaking changes)

          DESCRIPTION REQUIREMENTS:
          - Must begin with present-tense verb that completes 'This PR...'
          - Accepted verbs: Adds, Removes, Fixes, Updates, Refactors, Improves, Deprecates or similar
          - Focus on user-facing changes, not technical implementation details
          - Describe from user's perspective, not developer's

          CONTENT GUIDELINES:
          - Patch updates: Often one-line, clearly communicate impact
          - New features: Begin with 'Adds' or similar, more detail than one line, mention new capabilities, optionally include usage example
          - Breaking changes: Use verbs such as 'Removes'/'Changes'/'Deprecates', provide migration guidance
          - Use inline code for API references
          - Avoid internal implementation details

          IMPORTANT: Validate each file separately and provide results for each individual file. Extract the file path from the '<changeset file="path">' tags and include it in your response.

          Changesets to validate:
          $changesets"

          echo "Prompt length: ${#prompt} characters"

          # Define JSON schema for per-file validation tracking
          schema='{
            "type": "object",
            "properties": {
              "overall_valid": {
                "type": "boolean",
                "description": "Whether all changesets pass validation"
              },
              "files": {
                "type": "array",
                "items": {
                  "type": "object",
                  "properties": {
                    "file": {
                      "type": "string",
                      "description": "Path to the changeset file"
                    },
                    "valid": {
                      "type": "boolean",
                      "description": "Whether this specific file passes validation"
                    },
                    "errors": {
                      "type": "array",
                      "items": {"type": "string"},
                      "description": "Specific errors found in this file"
                    },
                    "suggestions": {
                      "type": "array",
                      "items": {"type": "string"},
                      "description": "Improvement suggestions for this file"
                    }
                  },
                  "required": ["file", "valid", "errors", "suggestions"],
                  "additionalProperties": false
                },
                "description": "Per-file validation results"
              }
            },
            "required": ["overall_valid", "files"],
            "additionalProperties": false
          }'

          echo "Using JSON schema for structured output"

          # Run validation with llm CLI using JSON schema
          echo "Running llm CLI with github/gpt-5-mini model and JSON schema"
          response=$(echo "$prompt" | llm prompt -m github/gpt-5-mini --schema "$schema" --no-stream 2>&1) || {
            echo "::error::Failed to run llm CLI. Exit code: $?"
            echo "Error output: $response"
            response='{"overall_valid": false, "files": [{"file": "unknown", "valid": false, "errors": ["Failed to get AI response"], "suggestions": []}]}'
          }

          echo "LLM response received (first 500 chars):"
          echo "$response" | head -c 500
          echo ""

          # Save response for parsing
          echo "$response" > validation_response.json
          echo "Response saved to validation_response.json"

          # Extract validation status
          if echo "$response" | jq -e '.overall_valid == true' > /dev/null 2>&1; then
            echo "::notice::Validation passed"
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Validation failed or could not parse response"
            echo "valid=false" >> "$GITHUB_OUTPUT"

            # Show per-file errors if present
            echo "$response" | jq -r '.files[]? | select(.errors | length > 0) | "File: " + .file + " - Errors: " + (.errors | join(", "))' 2>/dev/null || true
          fi

      - name: Comment validation results on PR
        if: steps.validate.outputs.has_changesets == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let validation;

            try {
              const raw = fs.readFileSync('validation_response.json', 'utf8');
              validation = JSON.parse(raw);
            } catch (e) {
              validation = {
                overall_valid: false,
                files: [{
                  file: "unknown",
                  valid: false,
                  errors: ["Failed to parse validation response"],
                  suggestions: []
                }]
              };
            }

            // Find existing comment first
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = "## 📝 Changeset Validation Results";
            const existingComment = comments.find(c =>
              c.user?.type === "Bot" && c.body?.includes(marker)
            );

            // Handle both old and new schema formats for backwards compatibility
            const isNewFormat = validation.overall_valid !== undefined;
            const overallValid = isNewFormat ? validation.overall_valid : validation.valid;

            // Count total errors across all files
            let totalErrors = 0;
            if (isNewFormat && validation.files) {
              totalErrors = validation.files.reduce((sum, file) => {
                return sum + (file.errors ? file.errors.length : 0);
              }, 0);
            } else if (validation.errors) {
              totalErrors = validation.errors.length;
            }

            // If validation passes and there are no errors, don't comment
            if (overallValid && totalErrors === 0) {
              // Delete existing comment if it exists
              if (existingComment) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id
                });
                console.log("Deleted existing comment - validation passed");
              }
              return; // Don't create a new comment
            }

            // Only comment if there are actual errors
            let comment = "## 📝 Changeset Validation Results\n\n";
            comment += "❌ **Changeset validation failed**\n\n";

            if (isNewFormat && validation.files) {
              // New format: show per-file results
              const failedFiles = validation.files.filter(file => {
                return !file.valid || (file.errors && file.errors.length > 0);
              });

              if (failedFiles.length > 0) {
                comment += "### Issues Found:\n\n";

                failedFiles.forEach(file => {
                  comment += "#### [\\`" + file.file + "\\`](" + file.file + ")\n\n";

                  if (file.errors && file.errors.length > 0) {
                    comment += "**Errors:**\n";
                    file.errors.forEach(error => {
                      comment += "- " + error + "\n";
                    });
                    comment += "\n";
                  }

                  if (file.suggestions && file.suggestions.length > 0) {
                    comment += "**Suggestions:**\n";
                    file.suggestions.forEach(suggestion => {
                      comment += "- " + suggestion + "\n";
                    });
                    comment += "\n";
                  }
                });
              }
            } else {
              // Old format: fallback for backwards compatibility
              if (validation.errors && validation.errors.length > 0) {
                comment += "### Errors Found:\n";
                validation.errors.forEach(error => {
                  comment += "- " + error + "\n";
                });
                comment += "\n";
              }

              if (validation.suggestions && validation.suggestions.length > 0) {
                comment += "### Suggestions:\n";
                validation.suggestions.forEach(suggestion => {
                  comment += "- " + suggestion + "\n";
                });
                comment += "\n";
              }
            }

            comment += "---\n";
            comment += "*📖 See [Astro's changeset guide](https://contribute.docs.astro.build/docs-for-code-changes/changesets/) for details.*";

            // Update or create comment only for failures
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

            if (!overallValid) {
              core.setFailed("Changeset validation failed - see PR comment for details");
            }
