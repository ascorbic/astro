name: Validate Changesets

on:
  pull_request:
    paths:
      - '.changeset/*.md'

concurrency:
  group: validate-changesets-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-changesets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install llm CLI
        run: |
          python -m pip install --upgrade pip
          pip install "llm-github-models"

      - name: Collect and validate changesets
        id: validate
        run: |
          echo "Starting changeset validation"

          # Find changed changeset files
          echo "Looking for changed files between ${{ github.event.pull_request.base.sha }} and ${{ github.sha }}"
          git diff --name-only --diff-filter=AM \
            "${{ github.event.pull_request.base.sha }}...${{ github.sha }}" \
            -- '.changeset/*.md' | grep -v 'README.md' > changeset_files.txt || true

          echo "Found changeset files:"
          cat changeset_files.txt || true

          if [ ! -s changeset_files.txt ]; then
            echo "::notice::No changeset files to validate"
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Found $(wc -l < changeset_files.txt) changeset file(s) to validate"

          # Collect changeset contents
          changesets=""
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "Reading changeset file: $file"
              changesets+="=== File: $file ===\n"
              changesets+="$(cat "$file")\n\n"
            else
              echo "::warning::Changeset file not found: $file"
            fi
          done < changeset_files.txt

          echo "Collected changesets content (first 500 chars):"
          echo "$changesets" | head -c 500

          # Create the validation prompt
          prompt="You are a changeset format validator for the Astro project.

          Validate changesets against these requirements:
          1) Must start with YAML frontmatter (--- delimiters)
          2) Description must begin with present-tense verb: Adds, Removes, Fixes, Updates, Refactors, Improves, Deprecates
          3) Must describe user-facing impact, not internal implementation details
          4) Change types: patch (bug fixes), minor (new features), major (breaking changes)

          Changesets to validate:
          $changesets"

          echo "Prompt length: ${#prompt} characters"

          # Define simple schema for structured output
          schema='valid bool, errors array, suggestions array'
          echo "Using simple schema: $schema"

          # Run validation with llm CLI using simple schema
          echo "Running llm CLI with github/gpt-5-mini model and simple schema"
          response=$(echo "$prompt" | llm prompt -m github/gpt-5-mini --schema "$schema" --no-stream 2>&1) || {
            echo "::error::Failed to run llm CLI. Exit code: $?"
            echo "Error output: $response"
            response='{"valid": false, "errors": ["Failed to get AI response"], "suggestions": []}'
          }

          echo "LLM response received (first 500 chars):"
          echo "$response" | head -c 500
          echo ""

          # Save response for parsing
          echo "$response" > validation_response.json
          echo "Response saved to validation_response.json"

          # Extract validation status
          if echo "$response" | jq -e '.valid == true' > /dev/null 2>&1; then
            echo "::notice::Validation passed"
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Validation failed or could not parse response"
            echo "valid=false" >> "$GITHUB_OUTPUT"

            # Show errors if present
            errors=$(echo "$response" | jq -r '.errors[]?' 2>/dev/null)
            if [ -n "$errors" ]; then
              echo "Validation errors found:"
              echo "$errors"
            fi
          fi

      - name: Comment validation results on PR
        if: steps.validate.outputs.has_changesets == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let validation;

            try {
              const raw = fs.readFileSync('validation_response.json', 'utf8');
              validation = JSON.parse(raw);
            } catch (e) {
              validation = {
                valid: false,
                errors: ["Failed to parse validation response"],
                suggestions: []
              };
            }

            let comment = "## 📝 Changeset Validation Results\n\n";

            if (validation.valid) {
              comment += "✅ **All changesets are properly formatted!**\n\n";
            } else {
              comment += "❌ **Changeset validation failed**\n\n";

              if (validation.errors && validation.errors.length > 0) {
                comment += "### Errors Found:\n";
                validation.errors.forEach(error => {
                  comment += `- ${error}\n`;
                });
                comment += "\n";
              }
            }

            if (validation.suggestions && validation.suggestions.length > 0) {
              comment += "### Suggestions:\n";
              validation.suggestions.forEach(suggestion => {
                comment += `- ${suggestion}\n`;
              });
              comment += "\n";
            }

            comment += "---\n";
            comment += "*📖 See [Astro's changeset guide](https://contribute.docs.astro.build/docs-for-code-changes/changesets/) for details.*";

            // Find and update or create comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = "## 📝 Changeset Validation Results";
            const existingComment = comments.find(c =>
              c.user?.type === "Bot" && c.body?.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

            if (!validation.valid) {
              core.setFailed("Changeset validation failed - see PR comment for details");
            }