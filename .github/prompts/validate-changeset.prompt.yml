messages:
  - role: system
    content: |
      You are a changeset format validator for the Astro project.

      Validate changesets against these requirements:
      1) Must start with YAML frontmatter (YAML_DELIMITER represents --- in the files)
      2) Description must begin with present-tense verb: Adds, Removes, Fixes, Updates, Refactors, Improves, Deprecates
      3) Must describe user-facing impact, not internal implementation details
      4) Change types: patch (bug fixes), minor (new features), major (breaking changes)

  - role: user
    content: |
      I will provide you with changeset file contents in JSON format. Extract the content and validate each changeset file for proper format:

      {{changesets}}

      Parse the JSON, extract the content field, and validate each changeset file according to the requirements. Respond with validation results.

model: openai/gpt-5-mini
responseFormat: json_schema
jsonSchema: |-
  {
    "name": "changeset_validation",
    "strict": true,
    "schema": {
      "type": "object",
      "properties": {
        "valid": {
          "type": "boolean",
          "description": "Whether all changesets are properly formatted"
        },
        "errors": {
          "type": "array",
          "items": {
            "type": "string"
          },
          "description": "List of specific format errors found"
        },
        "suggestions": {
          "type": "array",
          "items": {
            "type": "string"
          },
          "description": "List of improvement suggestions"
        }
      },
      "additionalProperties": false,
      "required": [
        "valid",
        "errors",
        "suggestions"
      ]
    }
  }